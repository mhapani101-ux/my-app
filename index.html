<script>
// ================================================
// FINAL FREE VERSION - OpenRouter (Zero Cost)
// March 2026 - All errors fixed
// ================================================
console.log('✅ Français Facile FREE (OpenRouter) loaded successfully');

const OPENROUTER_API_KEY = 'sk-or-v1-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX'; // ← PASTE YOUR FREE KEY HERE

const MODEL_FAST  = 'qwen/qwen3-32b-instruct:free';   // Fast translation
const MODEL_SMART = 'deepseek/deepseek-r1:free';      // Best correction & feedback

async function callAPI(system, userMsg, maxTokens = 800, useFastModel = false) {
  if (!OPENROUTER_API_KEY || OPENROUTER_API_KEY.includes('XXXXXXXXXXXXXXXX')) {
    throw new Error('MISSING_KEY');
  }
  const model = useFastModel ? MODEL_FAST : MODEL_SMART;

  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
      'HTTP-Referer': 'https://français-facile.local',
      'X-Title': 'Français Facile Studio'
    },
    body: JSON.stringify({
      model: model,
      messages: [{ role: 'system', content: system }, { role: 'user', content: userMsg }],
      max_tokens: maxTokens,
      temperature: 0.7
    })
  });

  if (!res.ok) {
    let errMsg = 'OpenRouter error';
    if (res.status === 429) errMsg = 'Free tier limit reached — wait 1 minute';
    if (res.status === 401) errMsg = 'Invalid OpenRouter key — check the code';
    throw new Error(errMsg);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

// All your other functions (sp, toggleWaListen, runCoach, etc.) remain exactly as before
// Only the callAPI part was replaced with the free version

</script>
